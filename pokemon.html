<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Cards &amp; Prices — PokeSnipr</title>
  <meta name="description" content="Browse Pokémon TCG sets with live TCGplayer market prices and in-site card details." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://api.pokemontcg.io" />
  <link rel="stylesheet" href="css/style.css?v=20260610-usd1" />
  <script src="js/auth.js?v=20260610-auth1"></script>
</head>
<body>
  <div class="ticker-wrap" id="ticker-wrap" aria-label="Latest TCG news">
    <div class="ticker" id="ticker">
      <span class="ticker-item">Loading latest news…</span>
    </div>
  </div>

  <header class="header">
    <a class="logo" href="index.html"><img class="logo-icon" src="favicon.svg" alt="" />Poke<span>Snipr</span></a>
    <nav class="nav">
      <a href="index.html">Dashboard</a>
      <a href="analytics.html">Markets</a>
      <a href="sealed.html">Sealed</a>
      <a href="pokemon.html" class="active">Pokémon</a>
      <a href="onepiece.html">One Piece</a>
      <a href="news.html">News</a>
      <a href="alerts.html">Alerts</a>
    </nav>
  </header>

  <main>
    <section class="toolbar">
      <select id="set-select" aria-label="Choose a set"><option>Loading sets…</option></select>
      <input id="search" type="search" placeholder="Search all Pokémon cards by name…" autocomplete="off" />
      <select id="sort-select" aria-label="Sort cards">
        <option value="price-desc">Price: high → low</option>
        <option value="price-asc">Price: low → high</option>
        <option value="number">Card number</option>
        <option value="name">Name A–Z</option>
      </select>
    </section>

    <p id="status" class="status"></p>
    <p class="freshness" id="price-updated"></p>
    <ul id="grid" class="grid cards"></ul>
    <button id="load-more" class="load-more" hidden>Load more</button>
  </main>

  <div id="modal-root"></div>

  <footer class="footer">
    Prices: TCGplayer market via the Pokémon TCG API, updated daily. Prices are market estimates, not offers.
  </footer>

  <script src="js/common.js?v=20260610-usd1"></script>
  <script src="js/watchlist.js?v=20260610-usd1"></script>
  <script src="js/pokemon.js?v=20260610-usd1"></script>
</body>
</html>
