name: Deploy Senpai to GitHub Pages

on:
  push:
    branches: [claude/senpai-repo-setup-ozm876, main]
    paths:
      - 'senpai/**'
      - '.github/workflows/senpai-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: senpai/package-lock.json

      - name: Install dependencies
        working-directory: senpai
        run: npm ci

      - name: Build
        working-directory: senpai
        env:
          VITE_BASE: /tcg-tracker/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: senpai/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
