<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Piece Cards &amp; Prices — PokeSnipr</title>
  <meta name="description" content="Browse One Piece Card Game sets with TCGplayer market prices and in-site card details." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=3" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="PokeSnipr" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://optcgapi.com" />
  <link rel="stylesheet" href="css/style.css?v=20260611-pk9" />
  <link rel="stylesheet" href="css/vault-theme.css?v=1" />
  <script src="js/auth.js?v=20260611-auth2"></script>
</head>
<body class="theme-op">
  <div class="ticker-wrap" id="ticker-wrap" aria-label="Latest TCG news">
    <div class="ticker" id="ticker">
      <span class="ticker-item">Loading latest news…</span>
    </div>
  </div>

  <header class="header">
    <a class="logo" href="index.html"><img class="logo-icon" src="favicon.svg" alt="" />Poke<span>Snipr</span></a>
    <nav class="nav">
      <a href="index.html">Dashboard</a>
      <a href="analytics.html">Markets</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="sealed.html">Sealed</a>
      <a href="pokemon.html">Pokémon</a>
      <a href="onepiece.html" class="active">One Piece</a>
      <a href="news.html">News</a>
      <a href="alerts.html">Alerts</a>
    </nav>
  </header>

  <main>
    <section class="toolbar">
      <select id="set-select" aria-label="Choose a set"><option>Loading sets…</option></select>
      <input id="search" type="search" placeholder="Filter cards in this set…" autocomplete="off" />
      <select id="sort-select" aria-label="Sort cards">
        <option value="price-desc">Price: high → low</option>
        <option value="price-asc">Price: low → high</option>
        <option value="number">Card number</option>
        <option value="name">Name A–Z</option>
      </select>
    </section>

    <p id="status" class="status"></p>
    <p class="freshness" id="price-updated"></p>
    <ul id="grid" class="grid cards"></ul>
  </main>

  <div id="modal-root"></div>

  <footer class="footer">
    Prices: TCGplayer market via OPTCG API, updated daily. Prices are market estimates, not offers.
  </footer>

  <script src="js/portfolio-store.js?v=20260612-pk9"></script>
  <script src="js/alerts-store.js?v=20260612-pk9"></script>
  <script src="js/common.js?v=20260611-pk9"></script>
  <script src="js/watchlist.js?v=20260611-pk9"></script>
  <script src="js/onepiece.js?v=20260611-pk9"></script>
  <script src="js/push.js?v=20260612-pk10"></script>
</body>
</html>
